trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

steps:
  - script: |
      echo "✅ Step 1: Check Node.js"
      node -v
    displayName: Check Node.js

  - script: |
      echo "⬇️ Step 2: Install Serverless"
      npm install -g serverless
    displayName: Install Serverless

  - script: |
      echo "🧪 Step 3: Deploying Lambda"
      set -e
      sls deploy --stage dev
    displayName: Deploy Lambda
