steps:
  - script: |
      if ! command -v sls &>/dev/null; then
        if ! yum list installed nodejs >/dev/null 2>&1; then
          echo "Package nodejs is not installed. Installing nodejs first..."
          sudo yum install -y nodejs
        fi
        echo "Installing serverless framework..."
        sudo dnf install -g serverless@2.72.3
      else
        echo "Serverless framework is already installed. Skipping..."
      fi
    displayName: Install Serverless Framework
