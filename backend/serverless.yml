service: node-serverless-project
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET
          cors: true   # ✅ Enables CORS so frontend can access Lambda

plugins:
  - serverless-plugin-typescript
