service: node-serverless-project
frameworkVersion: "3"
#configValidationMode: error # 👈 Strict config checking

provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  httpApi:
    cors: true

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET

plugins:
  - serverless-plugin-typescript
