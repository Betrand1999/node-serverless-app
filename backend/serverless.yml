service: node-serverless-project
frameworkVersion: "3"

provider:
  name: aws
  runtime: nodejs18.x # or nodejs18.x if you want to stay on 18
  region: us-east-1
  httpApi:
    cors: true # ✅ enable CORS globally for httpApi

functions:
  hello:
    handler: handler.hello
    events:
      - httpApi:
          path: /hello
          method: GET

plugins:
  - serverless-plugin-typescript
