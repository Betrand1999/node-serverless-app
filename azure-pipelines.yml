trigger:
- main  

pool:
  name: Default              
  demands:
    - Agent.Name -equals ip-172-31-36-189  
variables:
- group: aws-credentials
- name: STAGE
  value: dev
- name: AWS_REGION
  value: us-east-1

steps:
- checkout: self
  clean: true  

# ✅ Install Node.js 18 (your template should use dnf and match EC2 setup)
- template: install_nodejs.yml
  parameters:
    version: '18'

# ✅ Install Serverless CLI (from your `install_serverless.yml`)
- template: install_serverless.yml

# ✅ Build & Deploy backend
- script: |
    set -euo pipefail
    cd backend
    npm install
    npx serverless deploy --stage $(STAGE) --region $(AWS_REGION) --verbose
  displayName: Build & Deploy (Serverless)

  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    # AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
    AWS_REGION: $(AWS_REGION)
- script: |
    echo "Checking installed versions:"
    sls -v
    node -v
    npm -v
    npx -v
  displayName: Show tool versions
