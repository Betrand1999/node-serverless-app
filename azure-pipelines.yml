trigger:
- main  

pool:
  name: Default              
  demands:
    - Agent.Name -equals ip-172-31-36-189  

variables:
- group: aws-credentials
- name: STAGE
  value: dev
- name: AWS_REGION
  value: us-east-1

steps:
- checkout: self
  clean: true  

# ✅ Show current branch to confirm trigger
- script: |
    echo "Running on branch: $(Build.SourceBranch)"
  displayName: Show Git Branch

# ✅ Install Node.js 18
- template: install_nodejs.yml
  parameters:
    version: '18'

# ✅ Install Serverless CLI
- template: install_serverless.yml

# ✅ Show tool versions
- script: |
    echo "Checking installed versions:"
    sls -v
    node -v
    npm -v
    npx -v
  displayName: Show tool versions

# ✅ Build & Deploy backend
- script: |
    set -euo pipefail
    cd backend
    npm install
    npx serverless deploy --stage $(STAGE) --region $(AWS_REGION) --verbose --force
  displayName: Build & Deploy (Serverless)

  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    # AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
    AWS_REGION: $(AWS_REGION)
