trigger:
- main  

pool:
  name: Default              
  demands:
     - Agent.Name -equals ip-172-31-44-103

variables:
- group: aws-credentials
- name: STAGE
  value: dev
- name: AWS_REGION
  value: us-east-1

steps:
- checkout: self
  clean: true  


- script: |
    echo "Running on branch: $(Build.SourceBranch)"
  displayName: Show Git Branch

- template: install_nodejs.yml
  parameters:
    version: 22'

# ✅ Install Serverless CLI
- template: install_serverless.yml

# ✅ Show tool versions
- script: |
    echo "======================================="
    echo "✅ Tool Versions in This Pipeline Run"
    echo "======================================="
    
    echo "➡ Serverless CLI Version:"
    sls -v
    
    echo "➡ Node.js Version:"
    node -v
    
    echo "➡ npm Version:"
    npm -v
    
    echo "➡ npx Version:"
    npx -v
    
    echo "======================================="
  displayName: Show tool versions


# ✅ Build & Deploy backend
- script: |
    set -euo pipefail
    cd backend
    npm install

   
      npx serverless deploy --stage $(STAGE) --region $(AWS_REGION) --verbose --force
    # npx serverless remove --stage $(STAGE) --region $(AWS_REGION)
  displayName: Deploy or Remove Serverless Stack

  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_REGION: $(AWS_REGION)
