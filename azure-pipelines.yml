trigger:
- main

pool:
  name: Self-Hosted
  demands:
  - Agent.Name -equals 1723136189

variables:
  STAGE: dev
  AWS_REGION: us-east-1

steps:
- checkout: self
  clean: true

# Ensure Node 18 on the agent
- template: install_nodejs.yml
  parameters:
    version: '18'

# Install Serverless CLI
- template: install_serverless.yml

# Build & Deploy the backend
- script: |
    set -euo pipefail
    cd backend
    npm ci
    npx serverless deploy --stage $(STAGE) --region $(AWS_REGION) --verbose
  displayName: Build & Deploy (Serverless)
  env:
    AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
    AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
    AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
    AWS_REGION: $(AWS_REGION)
