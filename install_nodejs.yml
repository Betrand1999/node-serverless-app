parameters:
  - name: version
    displayName: Choose and install nodejs in selected version
    type: string

steps:
  - script: |
      if [ "$(node -v | sed -E 's/v([0-9]+)\..*/\1/')" != "${{ parameters.version }}" ]; then
        sudo dnf module reset -y nodejs
        sudo dnf module install -y nodejs:${{ parameters.version }}/common
        sudo dnf module enable nodejs:${{ parameters.version }}/common
      else
        echo "Nodejs version ${{ parameters.version }} is already installed."
      fi
    displayName: install nodejs ${{ parameters.version }}
